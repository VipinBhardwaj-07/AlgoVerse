<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful | AlgoVerse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="success-shell">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <h1>Payment Successful</h1>
      <p>Your AlgoVerse Pro access has been unlocked.</p>
      <div class="success-details" id="successDetails"></div>
      <a href="index.html" class="btn-primary success-btn">Return to Home</a>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const plan = params.get('plan') || 'Pro Version';
    const amount = params.get('amount') || '$19 lifetime';
    const email = params.get('email') || 'your email';
    document.getElementById('successDetails').innerHTML = `
      <strong>${plan}</strong><br />
      Amount: ${amount}<br />
      Receipt sent to: ${email}
    `;
  </script>
</body>
</html>
